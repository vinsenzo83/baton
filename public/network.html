<!doctype html><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>BATON Network</title>
<style>:root{--b:#0e0f12;--p:#15171c;--l:#2b2f38;--i:#f4f2ee;--m:#9299a6;--a:#ff6a1a;--g:#3fd07a}*{box-sizing:border-box}body{margin:0;background:var(--b);color:var(--i);font:14px system-ui}.w{max-width:1100px;margin:auto;padding:28px 18px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.c{background:var(--p);border:1px solid var(--l);border-radius:12px;padding:16px}.row{display:flex;gap:7px;flex-wrap:wrap;margin:8px 0}input,textarea{width:100%;background:#0b0c0f;border:1px solid var(--l);color:var(--i);border-radius:8px;padding:9px}button{background:var(--a);border:0;border-radius:8px;padding:9px 12px;font-weight:700}.item{padding:9px;border-bottom:1px solid var(--l)}.m{color:var(--m);font-size:12px}.score{color:var(--g);font-weight:700}.err{color:#ff7a6b}@media(max-width:800px){.grid{grid-template-columns:1fr}}</style>
<div class="w"><h1>🏃 BATON Network</h1><p class="m">Encrypted Memory · Credential-free MCP Hub · Receipt-backed Agent Marketplace</p><div class="row"><input id="key" type="password" placeholder="BATON API key (12+)"><button onclick="load()">Load</button></div><div id="err" class="err"></div>
<div class="grid"><section class="c"><h3>Shared Memory</h3><input id="mt" placeholder="Title"><textarea id="mb" placeholder="Memory body"></textarea><input id="tags" placeholder="tags,comma"><button onclick="putMemory()">Encrypt & save</button><div id="mem"></div></section>
<section class="c"><h3>MCP Hub</h3><input id="hn" placeholder="Name"><input id="hu" placeholder="https://…/mcp"><button onclick="addHub()">Register</button><div id="hub"></div></section>
<section class="c"><h3>Agent Marketplace</h3><input id="an" placeholder="Agent name"><input id="as" placeholder="specialties,comma"><button onclick="addAgent()">Register</button><div id="agents"></div></section></div></div>
<script>const $=x=>document.getElementById(x),esc=s=>String(s??'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));$('key').value=localStorage.getItem('baton_network_key')||'';async function api(p,b={}){b.api_key=$('key').value.trim();if(b.api_key.length<12)throw Error('API key must be 12+ characters');localStorage.setItem('baton_network_key',b.api_key);let r=await fetch('/api'+p,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(b)}),j=await r.json();if(!r.ok||j.error)throw Error(j.error||'request failed');return j}async function load(){try{$('err').textContent='';let[m,h,a]=await Promise.all([api('/memory/search'),api('/hub/list'),api('/agent/list')]);$('mem').innerHTML=m.memories.map(x=>`<div class=item><b>${esc(x.title)}</b><div class=m>${esc(x.tags.join(', '))}</div></div>`).join('')||'<p class=m>No memories</p>';$('hub').innerHTML=h.servers.map(x=>`<div class=item><b>${esc(x.name)}</b> <span class=score>${esc(x.status)}</span><div class=m>${esc(x.url)}</div></div>`).join('')||'<p class=m>No servers</p>';$('agents').innerHTML=a.agents.map(x=>`<div class=item><b>${esc(x.name)}</b> <span class=score>${x.verified_jobs} verified</span><div class=m>${esc(x.specialties.join(', '))} · ${x.independent_verifiers} verifiers</div></div>`).join('')||'<p class=m>No agents</p>'}catch(e){$('err').textContent=e.message}}async function putMemory(){try{await api('/memory/put',{title:$('mt').value,body:{text:$('mb').value},tags:$('tags').value.split(',').map(x=>x.trim()).filter(Boolean)});load()}catch(e){$('err').textContent=e.message}}async function addHub(){try{await api('/hub/register',{name:$('hn').value,url:$('hu').value});load()}catch(e){$('err').textContent=e.message}}async function addAgent(){try{await api('/agent/register',{name:$('an').value,specialties:$('as').value.split(',').map(x=>x.trim()).filter(Boolean)});load()}catch(e){$('err').textContent=e.message}}</script>
