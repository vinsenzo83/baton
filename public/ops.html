<!doctype html><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>BATON Operations</title>
<style>
:root{--bg:#0e0f12;--p:#15171c;--l:#2b2f38;--i:#f4f2ee;--m:#9299a6;--a:#ff6a1a;--g:#3fd07a}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--i);font:14px system-ui}.w{max-width:1100px;margin:auto;padding:28px 18px}h1{margin:0 0 5px}.sub,.muted{color:var(--m)}.key{display:flex;gap:8px;margin:22px 0}.key input,input,select{background:#0b0c0f;border:1px solid var(--l);color:var(--i);border-radius:8px;padding:10px}.key input{flex:1}button{background:var(--a);border:0;border-radius:8px;padding:10px 14px;font-weight:700;cursor:pointer}.grid{display:grid;grid-template-columns:2fr 1fr;gap:14px}.card{background:var(--p);border:1px solid var(--l);border-radius:12px;padding:16px;margin-bottom:14px}.row{display:flex;gap:8px;flex-wrap:wrap}.row input{flex:1}.task{border-left:3px solid var(--a);padding:9px 11px;margin:8px 0;background:#101217;border-radius:5px;display:flex;justify-content:space-between;gap:10px}.done{border-color:var(--g)}table{width:100%;border-collapse:collapse}td,th{text-align:left;border-bottom:1px solid var(--l);padding:8px;font-size:12px}.num{font:700 25px ui-monospace;color:var(--g)}.err{color:#ff7a6b;margin:8px 0}@media(max-width:760px){.grid{grid-template-columns:1fr}}
</style>
<div class="w"><h1>🏃 BATON Operations</h1><div class="sub">Task Graph · Git Evidence · Cost Monitor</div>
<div class="key"><input id="key" type="password" placeholder="BATON API key (12+ characters)"><button onclick="loadAll()">Load</button></div><div id="err" class="err"></div>
<div class="grid"><main>
<section class="card"><h3>Task Graph</h3><div class="row"><input id="title" placeholder="New task"><button onclick="createTask()">Add</button></div><div id="tasks" class="muted">API key를 입력하세요.</div></section>
<section class="card"><h3>Git Evidence</h3><div class="row"><input id="repo" placeholder="owner/repo"><input id="sha" placeholder="commit SHA"><input id="task" placeholder="task id (optional)"><button onclick="recordGit()">Bind</button></div><div id="git"></div></section>
</main><aside>
<section class="card"><h3>Total Cost</h3><div id="costTotal" class="num">$0.0000</div><div id="tokens" class="muted">0 tokens</div></section>
<section class="card"><h3>Record Cost</h3><div class="row"><input id="provider" placeholder="provider"><input id="model" placeholder="model"><input id="amount" type="number" step="0.0001" placeholder="USD"><button onclick="recordCost()">Add</button></div></section>
<section class="card"><h3>By Provider</h3><div id="costs"></div></section>
</aside></div></div>
<script>
const API="",$=id=>document.getElementById(id),esc=s=>String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
$("key").value=localStorage.getItem("baton_ops_key")||"";
async function api(path,body={}){body.api_key=$("key").value.trim();if(body.api_key.length<12)throw Error("API key must be at least 12 characters");localStorage.setItem("baton_ops_key",body.api_key);const r=await fetch(API+"/api"+path,{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify(body)});const j=await r.json();if(!r.ok||j.error)throw Error(j.error||"request failed");return j}
async function loadAll(){try{$("err").textContent="";const[g,c,e]=await Promise.all([api("/task/graph"),api("/cost/summary"),api("/git/evidence")]);$("tasks").innerHTML=g.tasks.length?g.tasks.map(t=>`<div class="task ${t.status==='done'?'done':''}"><span><b>${esc(t.title)}</b><br><small class="muted">${esc(t.id)} · ${esc(t.status)}</small></span><select onchange="updateTask('${esc(t.id)}',this.value)">${['todo','running','blocked','done','cancelled'].map(x=>`<option ${x===t.status?'selected':''}>${x}</option>`).join('')}</select></div>`).join(''):"No tasks";$("costTotal").textContent="$"+Number(c.totals.amount_usd||0).toFixed(4);$("tokens").textContent=(Number(c.totals.input_tokens||0)+Number(c.totals.output_tokens||0)).toLocaleString()+" tokens";$("costs").innerHTML=(c.by_provider||[]).map(x=>`<div class="task"><span>${esc(x.provider)} / ${esc(x.model||'—')}</span><b>$${Number(x.amount_usd).toFixed(4)}</b></div>`).join('')||"No cost events";$("git").innerHTML=(e.evidence||[]).slice(0,20).map(x=>`<div class="task"><span>${esc(x.repository)}<br><small class="muted">${esc(x.commit_sha)} · ${esc(x.task_id||'unbound')}</small></span><b>${x.test_exit_code===0?'✓':''}</b></div>`).join('')||"No Git evidence"}catch(e){$("err").textContent=e.message}}
async function createTask(){try{await api("/task/create",{title:$("title").value});$("title").value="";loadAll()}catch(e){$("err").textContent=e.message}}
async function updateTask(id,status){try{await api("/task/update",{task_id:id,status});loadAll()}catch(e){$("err").textContent=e.message}}
async function recordGit(){try{await api("/git/record",{repository:$("repo").value,commit_sha:$("sha").value,task_id:$("task").value||undefined});loadAll()}catch(e){$("err").textContent=e.message}}
async function recordCost(){try{await api("/cost/record",{provider:$("provider").value,model:$("model").value||undefined,amount_usd:Number($("amount").value),idempotency_key:crypto.randomUUID()});loadAll()}catch(e){$("err").textContent=e.message}}
</script>
